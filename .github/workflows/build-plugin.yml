name: Build Plugin ZIP

on:
  push:
    tags:
      - 'v*'          # push a tag like: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # also lets you trigger manually from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies (no dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      # ─── CHANGE THIS SLUG to match your plugin folder name ───────────────
      # It must match the folder WordPress will install the plugin under,
      # which is usually your repo name or the main .php file's folder.
      - name: Set build vars
        id: vars
        run: |
          SLUG="silc-wooinsight-ai"
          VERSION="${GITHUB_REF_NAME:-dev}"
          echo "slug=$SLUG"             >> $GITHUB_OUTPUT
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "zip=${SLUG}-${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Assemble plugin folder
        run: |
          mkdir -p /tmp/build/${{ steps.vars.outputs.slug }}
          rsync -a . /tmp/build/${{ steps.vars.outputs.slug }}/ \
            --exclude='.git'            \
            --exclude='.github'         \
            --exclude='node_modules'    \
            --exclude='tests'           \
            --exclude='.env'            \
            --exclude='.env.*'          \
            --exclude='*.md'            \
            --exclude='phpunit*'        \
            --exclude='composer.json'   \
            --exclude='composer.lock'   \
            --exclude='.gitignore'      \
            --exclude='*.test.php'

      - name: Create ZIP
        run: |
          cd /tmp/build
          zip -r "${{ steps.vars.outputs.zip }}" "${{ steps.vars.outputs.slug }}/"

      # Always upload as a downloadable artifact (visible in the Actions run)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.zip }}
          path: /tmp/build/${{ steps.vars.outputs.zip }}
          retention-days: 30

      # Only attaches to a GitHub Release when triggered by a tag push
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/${{ steps.vars.outputs.zip }}